name: Core language card

on:
  workflow_dispatch:
  schedule:
    - cron: "41 18 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/build-core-language-card.py"
      - ".github/workflows/core-language-card.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate core language cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/build-core-language-card.py

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/core-repo-languages-light.svg assets/core-repo-languages-dark.svg

          if git diff --cached --quiet; then
            echo "No language card changes."
          else
            git commit -m "Update core repository language cards"
            git push
          fi
