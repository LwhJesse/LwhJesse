name: Profile assets

on:
  workflow_dispatch:
  schedule:
    - cron: "41 18 * * *"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "scripts/**"
      - ".github/workflows/profile-assets.yml"
      - "assets/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate profile activity cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python scripts/build-profile-activity.py

      - name: Commit generated profile assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            assets/profile-activity-light.svg \
            assets/profile-activity-dark.svg

          if git diff --cached --quiet; then
            echo "No profile asset changes."
          else
            git commit -m "Update profile activity card"
            git push
          fi
