name: Profile assets

on:
  workflow_dispatch:
  schedule:
    - cron: "41 18 * * *"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "scripts/**"
      - ".github/workflows/profile-assets.yml"
      - "assets/**"
      - "profile-summary-card-output/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch profile summary cards
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python scripts/fetch-profile-summary-cards.py

      - name: Generate core repository language cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python scripts/build-core-language-card.py

      - name: Commit generated profile assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            assets/core-repo-languages-light.svg \
            assets/core-repo-languages-dark.svg \
            profile-summary-card-output/github/0-profile-details.svg \
            profile-summary-card-output/github/2-most-commit-language.svg \
            profile-summary-card-output/github_dark/0-profile-details.svg \
            profile-summary-card-output/github_dark/2-most-commit-language.svg

          if git diff --cached --quiet; then
            echo "No profile asset changes."
          else
            git commit -m "Update profile assets"
            git push
          fi
