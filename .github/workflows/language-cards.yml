name: Language Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate language cards
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/generate_language_cards.py

      - name: Commit generated language cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/external-contribution-languages-*.svg assets/own-repository-languages-*.svg
          if ! git diff --cached --quiet; then
            git commit -m "Generate language cards"
            git push
          else
            echo "language cards are already up to date"
          fi
